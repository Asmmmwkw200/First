<script>
async function fetchPrices() {
  try {
    const symbols = COINS.map(c => `${c}USDT`).join(',');
    const url = `https://api.binance.com/api/v3/ticker/24hr?symbols=[${COINS.map(c => `"${c}USDT"`).join(',')}]`;
    const res = await fetch(url);
    const data = await res.json();

    if (!Array.isArray(data)) return;

    data.forEach(d => {
      const sym = d.symbol.replace('USDT', '');
      prices[sym] = {
        price: parseFloat(d.lastPrice),
        change: parseFloat(d.priceChangePercent),
        volume: parseFloat(d.quoteVolume),
        high: parseFloat(d.highPrice),
        low: parseFloat(d.lowPrice)
      };
    });

    renderTicker();
  } catch (e) {
    console.error('fetchPrices failed', e);
  }
}

async function fetchKlines(symbol, interval) {
  const limit = interval === '15m' ? 100 : 60;
  const url = `https://api.binance.com/api/v3/klines?symbol=${symbol}USDT&interval=${interval}&limit=${limit}`;
  const res = await fetch(url);
  const data = await res.json();
  return Array.isArray(data) ? data : [];
}

async function fetchFearGreed() {
  try {
    const res = await fetch('https://api.alternative.me/fng/?limit=1');
    const data = await res.json();

    if (!data || !data.data || !data.data.length) throw new Error('Bad FNG response');

    const val = parseInt(data.data[0].value);
    const cls = data.data[0].value_classification;

    document.getElementById('fgValue').textContent = val;
    const color = val < 25 ? '#ff3d6b' : val < 45 ? '#ff9800' : val < 55 ? '#ffc107' : val < 75 ? '#8bc34a' : '#00e5a0';
    document.getElementById('fgValue').style.color = color;
    document.getElementById('fgLabel').textContent = cls;
    document.getElementById('fgLabel').style.color = color;

    const deg = (val / 100) * 180;
    document.getElementById('fgFill').style.borderTopColor = color;
    document.getElementById('fgFill').style.borderLeftColor = color;
    document.getElementById('fgFill').style.transform = `rotate(${135 + deg}deg)`;
  } catch (e) {
    console.error('fetchFearGreed failed', e);
    document.getElementById('fgValue').textContent = '--';
    document.getElementById('fgLabel').textContent = 'لا يتوفر';
  }
}
</script>
